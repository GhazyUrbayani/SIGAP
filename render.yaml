services:
  # ─── BACKEND ──────────────────────────────────
  - type: web
    name: sigap-backend
    runtime: python
    plan: free
    rootDir: backend
    pythonVersion: "3.11.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL_RAW
        fromDatabase:
          name: sigap-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: BMKG_API_URL
        value: https://data.bmkg.go.id/api/
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: https://sigap-frontend.onrender.com,http://localhost:5173

  # ─── FRONTEND (Static Site — always free) ─────
  - type: web
    name: sigap-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://sigap-backend.onrender.com

databases:
  - name: sigap-db
    databaseName: sigap
    user: sigap_user
    plan: free
    postgresMajorVersion: "15"
