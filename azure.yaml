name: sigap

metadata:
  template: sigap@0.0.1

services:
  backend:
    project: ./backend
    language: python
    host: appservice

  frontend:
    project: ./frontend
    language: js
    host: staticwebapp

hooks:
  postprovision:
    shell: sh
    run: |
      echo "Post-provision: configuring app settings..."
    interactive: false
  postdeploy:
    shell: sh
    run: |
      cd backend
      python -m alembic upgrade head
      python -m scripts.seed_kelurahan
      python -m scripts.seed_dummy_indicators
      python -m scripts.run_initial_uss
    interactive: false
    continueOnError: true
